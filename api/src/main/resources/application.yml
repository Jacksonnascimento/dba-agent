spring:
  application:
    name: api
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:dba_agent_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:81F66472481A6F2942468352F75E4D28A2535F8E24D9B6E1F4B5E87D94553210}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://192.168.1.15:3000}